<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acceso | Hotel Huayacán RH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <!-- Background glows -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="login-wrapper">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="login-logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="login-logo-text">Huayacán</span>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-card-header">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Ingresa tus credenciales para acceder al portal</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="login-email" name="email" placeholder="tu@correo.com" autocomplete="email" required />
          </div>
          <p class="field-error" id="error-email"></p>
        </div>

        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" id="toggle-pass" aria-label="Mostrar contraseña" onclick="togglePassword()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="field-error" id="error-password"></p>
        </div>

        <div id="login-error-box" class="alert-error" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="login-error-msg">Credenciales inválidas. Intenta de nuevo.</span>
        </div>

        <button type="submit" class="btn-primary btn-full" id="login-btn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-loader" style="display:none;">
            <svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle></svg>
          </span>
        </button>
      </form>

      <p class="login-footer-note">¿Problemas para acceder? Contacta a Recursos Humanos.</p>
    </div>

    <p class="login-copyright">© 2026 Hotel Huayacán · Todos los derechos reservados</p>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script>
    // ── Login Flow ──────────────────────────────────────────
    const loginForm = document.getElementById('login-form');
    const loginBtn  = document.getElementById('login-btn');
    const errorBox  = document.getElementById('login-error-box');
    const errorMsg  = document.getElementById('login-error-msg');

    // Redirect if already logged in
    (async () => {
      const session = await getSession();
      if (session) {
        const profile = await getProfile(session.user.id);
        redirectByRole(profile);
      }
    })();

    function redirectByRole(profile) {
      if (profile.role === 'admin') {
        window.location.href = 'admin.html';
      } else if (profile.onboarding_completo) {
        window.location.href = 'perfil.html';
      } else {
        window.location.href = 'onboarding.html';
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email) { showFieldErr('email', 'Ingresa tu correo.'); return; }
      if (!password) { showFieldErr('password', 'Ingresa tu contraseña.'); return; }

      setLoading(true);
      try {
        // 1. Autenticar — si falla aquí son credenciales incorrectas
        const { user } = await signIn(email, password);

        // 2. Obtener perfil — puede fallar si el perfil aún no existe
        let profile;
        try {
          profile = await getProfile(user.id);
        } catch (_profileErr) {
          // El perfil no existe (usuario creado antes del trigger).
          // Lo creamos ahora y mandamos a onboarding.
          await upsertProfile(user.id, { role: 'employee' });
          window.location.href = 'onboarding.html';
          return;
        }

        redirectByRole(profile);
      } catch (err) {
        // Solo llegamos aquí si signIn() falló → credenciales incorrectas
        console.error('Login error:', err);
        errorMsg.textContent = 'Credenciales incorrectas. Verifica tu correo y contraseña.';
        errorBox.style.display = 'flex';
      } finally {
        setLoading(false);
      }
    });


    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.querySelector('.btn-text').style.display  = loading ? 'none' : '';
      loginBtn.querySelector('.btn-loader').style.display = loading ? 'flex' : 'none';
    }

    function showFieldErr(field, msg) {
      const el = document.getElementById(`error-${field}`);
      if (el) { el.textContent = msg; el.style.display = 'block'; }
    }

    function togglePassword() {
      const pw = document.getElementById('login-password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
